name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -L --max-time 60 "https://smartresume-ai.streamlit.app" \
          -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
