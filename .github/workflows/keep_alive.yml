name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -L --max-time 180 --retry 3 --retry-delay 10 \
          "https://smartresume-ai-1122.streamlit.app" \
          -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
          || echo "App may have been asleep, ping attempted"
